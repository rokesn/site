kind = "web"
previewPath = "/"
title = "여기여"
version = "1.0.0"
id = "artifacts/yeogiyo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23134

[services.development]
run = "pnpm --filter @workspace/yeogiyo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/yeogiyo", "run", "build" ]
publicDir = "artifacts/yeogiyo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23134"
BASE_PATH = "/"
