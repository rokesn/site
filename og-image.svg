<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a0005"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F0001E"/>
      <stop offset="100%" style="stop-color:#c8001a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="url(#redGrad)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#redGrad)"/>

  <!-- Background decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="#F0001E" opacity="0.04"/>
  <circle cx="150" cy="500" r="150" fill="#F0001E" opacity="0.03"/>
  <circle cx="600" cy="315" r="400" fill="#F0001E" opacity="0.02"/>

  <!-- Grid pattern subtle -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>

  <!-- Brand badge -->
  <rect x="60" y="60" width="180" height="44" rx="22" fill="#F0001E"/>
  <text x="150" y="88" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">여기여.site</text>

  <!-- Main title -->
  <text x="60" y="230" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="white" letter-spacing="-2">여기여</text>

  <!-- Subtitle -->
  <text x="60" y="300" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#F0001E">세상의 모든 링크 주소모음 포털</text>

  <!-- Description line 1 -->
  <text x="60" y="365" font-family="Arial, sans-serif" font-size="24" fill="#888888">링크모음 · 주소모음 · 최신주소 실시간 안내</text>

  <!-- Description line 2 -->
  <text x="60" y="405" font-family="Arial, sans-serif" font-size="22" fill="#666666">DNS 우회 가이드 · 야코 최신주소 · 블로그</text>

  <!-- Divider -->
  <rect x="60" y="445" width="600" height="3" rx="2" fill="#F0001E" opacity="0.5"/>

  <!-- URL badge -->
  <rect x="60" y="470" width="340" height="50" rx="12" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
  <text x="230" y="501" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#F0001E" text-anchor="middle">yugiyu.com</text>

  <!-- Twitter badge -->
  <rect x="420" y="470" width="260" height="50" rx="12" fill="#1a1a2e" stroke="#333355" stroke-width="1"/>
  <text x="550" y="501" font-family="Arial, sans-serif" font-size="18" fill="#1d9bf0" text-anchor="middle">@ygy1552</text>

  <!-- Right decorative element -->
  <rect x="900" y="180" width="240" height="3" rx="2" fill="#F0001E" opacity="0.3"/>
  <text x="900" y="240" font-family="Arial, sans-serif" font-size="100" font-weight="900" fill="#F0001E" opacity="0.15">여</text>
  <text x="990" y="360" font-family="Arial, sans-serif" font-size="100" font-weight="900" fill="#F0001E" opacity="0.1">기</text>
  <text x="900" y="480" font-family="Arial, sans-serif" font-size="100" font-weight="900" fill="#F0001E" opacity="0.08">여</text>

  <!-- 2026 badge -->
  <rect x="1050" y="55" width="110" height="44" rx="8" fill="#F0001E22" stroke="#F0001E44" stroke-width="1"/>
  <text x="1105" y="83" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#F0001E" text-anchor="middle">2026</text>
</svg>
